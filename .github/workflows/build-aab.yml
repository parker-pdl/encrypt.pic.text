name: Build Play Store AAB
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Create Capacitor Android project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www
          cp steganography-app.html www/index.html
          npx cap init "Encrypt By Parker Data Link" com.stealthsnap --web-dir=www
          npx cap add android
      - name: Create upload keystore on first run
        id: ks
        run: |
          if [ ! -f signing/upload-keystore.jks ]; then
            mkdir -p signing
            keytool -genkeypair -v -keystore signing/upload-keystore.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass pdl-upload-2026 -keypass pdl-upload-2026 -dname "CN=Parker Data Link, O=Parker Data Link LLC, C=US"
            echo "new=1" >> "$GITHUB_OUTPUT"
          fi
      - name: Build release bundle
        run: cd android && ./gradlew bundleRelease --no-daemon
      - name: Sign bundle with upload key
        run: |
          AAB=$(find android/app/build/outputs/bundle/release -name '*.aab' | head -1)
          zip -d "$AAB" "META-INF/*" || true
          jarsigner -keystore signing/upload-keystore.jks -storepass pdl-upload-2026 "$AAB" upload
          mkdir -p out && cp "$AAB" out/encrypt-com.stealthsnap.aab
      - name: Commit keystore back to repo
        if: steps.ks.outputs.new == '1'
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add signing/upload-keystore.jks
          git commit -m "Add upload keystore"
          git push
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypt-aab
          path: out/*.aab
