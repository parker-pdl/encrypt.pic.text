<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Message Vault - Steganography</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f0d1e 100%);
            color: #00ff88;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 900px;
            width: 90%;
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.3), inset 0 0 20px rgba(0, 255, 136, 0.1);
            position: relative;
            z-index: 1;
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.8), 0 0 40px rgba(138, 43, 226, 0.6);
            letter-spacing: 3px;
        }

        .subtitle {
            text-align: center;
            color: #00d4ff;
            margin-bottom: 30px;
            font-size: 0.9em;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            letter-spacing: 2px;
        }

        .mode-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .mode-btn {
            padding: 12px 30px;
            border: 2px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .mode-btn:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transform: scale(1.05);
        }

        .mode-btn.active {
            background: rgba(0, 255, 136, 0.5);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.8);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95em;
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
            letter-spacing: 1px;
        }

        input[type="file"],
        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 255, 136, 0.05);
            border: 2px solid #00ff88;
            color: #00ff88;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }

        input[type="file"]::file-selector-button {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: rgba(0, 255, 136, 0.4);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        input:focus,
        textarea:focus {
            outline: none;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6), inset 0 0 10px rgba(0, 255, 136, 0.1);
            background: rgba(0, 255, 136, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-size: 0.9em;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 35px;
            border: 2px solid #00ff88;
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
            letter-spacing: 1px;
        }

        button:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .preview {
            margin-top: 20px;
            text-align: center;
        }

        .preview img {
            max-width: 300px;
            border: 2px solid #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            margin-top: 15px;
        }

        .message-display {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            word-break: break-all;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
        }

        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9em;
            color: #00d4ff;
        }

        .success {
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.8);
        }

        .error {
            color: #ff0055;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.8);
        }
    </style>
</head>
<body>
    <div class="stars" id="starsContainer"></div>

    <div class="container">
        <div class="title">🔐 SECRET VAULT</div>
        <div class="subtitle">HIDE MESSAGES IN PLAIN SIGHT</div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="switchMode('hide')">HIDE MESSAGE</button>
            <button class="mode-btn" onclick="switchMode('extract')">EXTRACT MESSAGE</button>
        </div>

        <!-- Hide Mode -->
        <div id="hideSection" class="section active">
            <div class="form-group">
                <label for="imageInput">SELECT IMAGE</label>
                <input type="file" id="imageInput" accept="image/jpeg,image/png,image/gif,image/webp">
                <div class="preview" id="imagePreview"></div>
            </div>

            <div class="form-group">
                <label for="secretMessage">SECRET MESSAGE</label>
                <textarea id="secretMessage" placeholder="Enter your secret message..."></textarea>
            </div>

            <div class="form-group">
                <label for="hidePassword">ENCRYPTION KEY (PASSWORD)</label>
                <input type="password" id="hidePassword" placeholder="Create a strong password...">
            </div>

            <div class="button-group">
                <button onclick="hideMessage()">⚡ ENCRYPT & HIDE ⚡</button>
            </div>

            <div id="hideStatus" class="status"></div>
        </div>

        <!-- Extract Mode -->
        <div id="extractSection" class="section">
            <div class="form-group">
                <label for="encryptedImage">SELECT ENCRYPTED IMAGE</label>
                <input type="file" id="encryptedImage" accept="image/jpeg,image/png,image/gif,image/webp">
                <div class="preview" id="encryptedPreview"></div>
            </div>

            <div class="form-group">
                <label for="extractPassword">ENCRYPTION KEY (PASSWORD)</label>
                <input type="password" id="extractPassword" placeholder="Enter the password...">
            </div>

            <div class="button-group">
                <button onclick="extractMessage()">🔓 DECRYPT & EXTRACT 🔓</button>
            </div>

            <div id="extractStatus" class="status"></div>
            <div id="messageDisplay"></div>
        </div>
    </div>

    <script>
        // Generate random stars
        function generateStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        generateStars();

        // Simple XOR encryption for passwords
        function xorEncrypt(text, key) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return btoa(result);
        }

        function xorDecrypt(encrypted, key) {
            try {
                const text = atob(encrypted);
                let result = '';
                for (let i = 0; i < text.length; i++) {
                    result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return result;
            } catch (e) {
                return null;
            }
        }

        function hideMessage() {
            const imageInput = document.getElementById('imageInput');
            const message = document.getElementById('secretMessage').value;
            const password = document.getElementById('hidePassword').value;
            const status = document.getElementById('hideStatus');

            if (!imageInput.files[0]) {
                status.className = 'status error';
                status.textContent = '❌ PLEASE SELECT AN IMAGE';
                return;
            }

            if (!message) {
                status.className = 'status error';
                status.textContent = '❌ PLEASE ENTER A MESSAGE';
                return;
            }

            if (!password) {
                status.className = 'status error';
                status.textContent = '❌ PLEASE SET A PASSWORD';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;

                    const encrypted = xorEncrypt(message, password);
                    const messageWithLength = encrypted.length + '|' + encrypted;

                    let messageBinary = '';
                    for (let i = 0; i < messageWithLength.length; i++) {
                        messageBinary += messageWithLength.charCodeAt(i).toString(2).padStart(8, '0');
                    }

                    if (messageBinary.length > data.length / 4) {
                        status.className = 'status error';
                        status.textContent = '❌ MESSAGE TOO LONG FOR THIS IMAGE';
                        return;
                    }

                    let bitIndex = 0;
                    for (let i = 0; i < data.length && bitIndex < messageBinary.length; i += 4) {
                        const bit = parseInt(messageBinary[bitIndex]);
                        data[i] = (data[i] & 0xFE) | bit;
                        bitIndex++;
                    }

                    ctx.putImageData(imageData, 0, 0);

                    canvas.toBlob(function(blob) {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'encrypted_message.png';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);

                        status.className = 'status success';
                        status.textContent = '✅ MESSAGE ENCRYPTED & HIDDEN! IMAGE DOWNLOADED.';
                    });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(imageInput.files[0]);
        }

        function extractMessage() {
            const imageInput = document.getElementById('encryptedImage');
            const password = document.getElementById('extractPassword').value;
            const status = document.getElementById('extractStatus');
            const display = document.getElementById('messageDisplay');

            if (!imageInput.files[0]) {
                status.className = 'status error';
                status.textContent = '❌ PLEASE SELECT AN ENCRYPTED IMAGE';
                return;
            }

            if (!password) {
                status.className = 'status error';
                status.textContent = '❌ PLEASE ENTER THE PASSWORD';
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;

                    let messageBinary = '';
                    for (let i = 0; i < data.length; i += 4) {
                        const bit = data[i] & 1;
                        messageBinary += bit;
                    }

                    let messageWithLength = '';
                    for (let i = 0; i < messageBinary.length; i += 8) {
                        const byte = messageBinary.substr(i, 8);
                        if (byte.length === 8) {
                            messageWithLength += String.fromCharCode(parseInt(byte, 2));
                        }
                    }

                    const parts = messageWithLength.split('|');
                    if (parts.length < 2) {
                        status.className = 'status error';
                        status.textContent = '❌ NO HIDDEN MESSAGE FOUND OR WRONG PASSWORD';
                        display.innerHTML = '';
                        return;
                    }

                    const length = parseInt(parts[0]);
                    const encrypted = parts[1].substr(0, length);

                    const decrypted = xorDecrypt(encrypted, password);

                    if (decrypted === null || decrypted === '') {
                        status.className = 'status error';
                        status.textContent = '❌ INVALID PASSWORD OR CORRUPTED DATA';
                        display.innerHTML = '';
                        return;
                    }

                    status.className = 'status success';
                    status.textContent = '✅ MESSAGE DECRYPTED SUCCESSFULLY!';
                    display.innerHTML = '<div class="message-display"><strong>HIDDEN MESSAGE:</strong><br><br>' + decrypted + '</div>';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(imageInput.files[0]);
        }

        function switchMode(mode) {
            const hideSection = document.getElementById('hideSection');
            const extractSection = document.getElementById('extractSection');
            const buttons = document.querySelectorAll('.mode-btn');

            buttons.forEach(btn => btn.classList.remove('active'));

            if (mode === 'hide') {
                hideSection.classList.add('active');
                extractSection.classList.remove('active');
                buttons[0].classList.add('active');
            } else {
                hideSection.classList.remove('active');
                extractSection.classList.add('active');
                buttons[1].classList.add('active');
            }
        }

        document.getElementById('imageInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('imagePreview');
                preview.innerHTML = '<img src="' + e.target.result + '" alt="Preview">';
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        document.getElementById('encryptedImage').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('encryptedPreview');
                preview.innerHTML = '<img src="' + e.target.result + '" alt="Preview">';
            };
            reader.readAsDataURL(e.target.files[0]);
        });
    </script>
</body>
</html>
